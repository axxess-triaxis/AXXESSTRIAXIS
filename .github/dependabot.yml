version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      next-and-react:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react*"
      testing:
        patterns:
          - vitest
          - "@testing-library/*"
          - jsdom
      linting:
        patterns:
          - eslint
          - eslint-config-next
          - "@eslint/*"
      ui-primitives:
        patterns:
          - "@radix-ui/*"
          - lucide-react
          - recharts

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
    open-pull-requests-limit: 5
