name: Mobile EAS Production Build Proof

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: "EAS build profile"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
  push:
    branches:
      - sprint-18-pilot-conversion-audit-exports-webhooks
    paths:
      - ".github/workflows/mobile-eas-production-build.yml"
      - "apps/mobile/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

concurrency:
  group: mobile-eas-production-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eas_build:
    name: Launch Android/iOS EAS builds
    runs-on: ubuntu-latest
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      EXPO_PUBLIC_IOS_BUNDLE_IDENTIFIER: com.triaxis.axxess
      EXPO_PUBLIC_ANDROID_APPLICATION_ID: com.triaxis.axxess
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CAPACITOR_SERVER_URL: ${{ secrets.CAPACITOR_SERVER_URL }}
      CAPACITOR_ALLOWED_HOSTS: ${{ secrets.CAPACITOR_ALLOWED_HOSTS }}
      BUILD_PLATFORM: ${{ github.event.inputs.platform || 'all' }}
      BUILD_PROFILE: ${{ github.event.inputs.profile || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck mobile app
        working-directory: apps/mobile
        run: pnpm run typecheck

      - name: Validate build and signing secrets
        id: eas-secrets
        shell: bash
        run: |
          set -euo pipefail
          platform="${BUILD_PLATFORM:-all}"

          missing=()
          require_secret() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              missing+=("$name")
            fi
          }

          require_secret "EXPO_TOKEN" "$EXPO_TOKEN"
          require_secret "NEXT_PUBLIC_APP_URL" "$EXPO_PUBLIC_APP_URL"
          require_secret "NEXT_PUBLIC_SUPABASE_URL" "$EXPO_PUBLIC_SUPABASE_URL"
          require_secret "NEXT_PUBLIC_SUPABASE_ANON_KEY" "$EXPO_PUBLIC_SUPABASE_ANON_KEY"
          require_secret "CAPACITOR_SERVER_URL" "$CAPACITOR_SERVER_URL"
          require_secret "CAPACITOR_ALLOWED_HOSTS" "$CAPACITOR_ALLOWED_HOSTS"

          if [[ "$platform" == "all" || "$platform" == "android" ]]; then
            require_secret "ANDROID_KEYSTORE_BASE64" "$ANDROID_KEYSTORE_BASE64"
            require_secret "ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEYSTORE_PASSWORD"
            require_secret "ANDROID_KEY_ALIAS" "$ANDROID_KEY_ALIAS"
            require_secret "ANDROID_KEY_PASSWORD" "$ANDROID_KEY_PASSWORD"
          fi

          if [[ "$platform" == "all" || "$platform" == "ios" ]]; then
            require_secret "ASC_KEY_ID" "$ASC_KEY_ID"
            require_secret "ASC_ISSUER_ID" "$ASC_ISSUER_ID"
            require_secret "ASC_PRIVATE_KEY" "$ASC_PRIVATE_KEY"
            require_secret "APPLE_TEAM_ID" "$APPLE_TEAM_ID"
          fi

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing required GitHub Actions secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            if [[ "${GITHUB_EVENT_NAME:-}" == "push" ]]; then
              echo "::warning::Skipping automatic EAS production proof because release secrets are not fully configured."
              echo "should_launch=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit 1
          fi

          echo "should_launch=true" >> "$GITHUB_OUTPUT"
          echo "Required mobile build and signing secrets are present."

      - name: Launch EAS build
        if: steps.eas-secrets.outputs.should_launch == 'true'
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          platform="${BUILD_PLATFORM:-all}"
          profile="${BUILD_PROFILE:-production}"

          touch eas-build-output.txt
          npx --yes eas-cli@latest build \
            --platform "$platform" \
            --profile "$profile" \
            --non-interactive \
            --wait \
            --json | tee eas-build-output.txt

      - name: Upload EAS build output
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mobile-eas-build-output
          path: apps/mobile/eas-build-output.txt
          if-no-files-found: warn
          retention-days: 14
