name: RAG Release Gate

on:
  pull_request:
    paths:
      - "src/services/rag/**"
      - "src/app/api/rag/**"
      - "supabase/migrations/**"
      - "scripts/rag-release-gate.mjs"
      - ".github/workflows/rag-release-gate.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    paths:
      - "src/services/rag/**"
      - "src/app/api/rag/**"
      - "supabase/migrations/**"
      - "scripts/rag-release-gate.mjs"
      - ".github/workflows/rag-release-gate.yml"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rag-release-gate:
    name: Required RAG Release Gate
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      RAG_RELEASE_GATE_WARNINGS_BLOCK: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run RAG release gate
        run: pnpm run rag:release-gate
