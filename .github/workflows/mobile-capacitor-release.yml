name: Capacitor Mobile Release




            npm --prefix apps/mobile-capacitor install --no-save @capacitor/ios@^7.0.0

on:

  push:

    tags:

      - 'v*'

  workflow_dispatch:



permissions:

  contents: read



jobs:

  android-production-release:

    runs-on: ubuntu-latest

    env:

      NEXT_TELEMETRY_DISABLED: '1'

      MOBILE_BUILD_NUMBER: ${{ github.run_number }}

      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:

      - name: Checkout

        uses: actions/checkout@v4

        with:

          fetch-depth: 0



      - name: Refresh repository state

        run: |

          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          git fetch origin --prune

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then

            git checkout -B "$BRANCH" "origin/$BRANCH"

            git pull --ff-only origin "$BRANCH"

          else

            echo "[mobile] No matching origin branch for ${BRANCH}; continuing with checked-out ref."

          fi



      - name: Setup pnpm

        uses: pnpm/action-setup@v4

        with:

          version: 11.7.0

          run_install: false



      - name: Setup Node

        uses: actions/setup-node@v4

        with:

          node-version: 22

          cache: pnpm



      - name: Setup Java

        uses: actions/setup-java@v4

        with:

          distribution: temurin

          java-version: '21'

          cache: gradle



      - name: Install dependencies

        run: |

          pnpm install --frozen-lockfile

          pnpm rebuild @swc/core lightningcss



      - name: Build web app

        run: |

          echo "[mobile] Skipping iOS web build in this job; Android job already validates web build."



      - name: Ensure Android project exists

        run: |

          if [ ! -f apps/mobile-capacitor/android/gradlew ]; then
            rm -rf apps/mobile-capacitor/android
            pnpm --dir apps/mobile-capacitor exec cap add android

          fi



      - name: Ensure Android assets path exists

        run: |

          mkdir -p apps/mobile-capacitor/android/app/src/main/assets/public



      - name: Sync Capacitor

        run: |

          node scripts/prepare-mobile-certificates.mjs

          node scripts/sync-repo-state.mjs

          node scripts/validate-mobile-env.mjs

          pnpm --dir apps/mobile-capacitor exec cap sync android



      - name: Verify Android signing secrets

        run: |

          missing=0

          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do

            if [ -z "${!key}" ]; then

              echo "::error::Missing required secret: $key"

              missing=1

            fi

          done

          if [ "$missing" -ne 0 ]; then

            exit 1

          fi



      - name: Prepare Android signing path

        run: |

          echo "ANDROID_KEYSTORE_FILE=$GITHUB_WORKSPACE/apps/mobile-capacitor/android/app/release.keystore" >> $GITHUB_ENV



      - name: Build Android production artifact

        run: |

          cd apps/mobile-capacitor/android

          ./gradlew bundleRelease



      - name: Android release readiness marker

        run: |

          echo "Android signed artifact is ready for Play Console upload."



      - name: Upload Android release artifacts

        uses: actions/upload-artifact@v4

        if: always()

        with:

          name: capacitor-android-release-${{ github.run_number }}

          path: |

            apps/mobile-capacitor/android/app/build/outputs/**

            apps/mobile-capacitor/build-metadata/**

          if-no-files-found: ignore



  ios-production-release:

    runs-on: macos-latest

    env:

      NEXT_TELEMETRY_DISABLED: '1'

      MOBILE_BUILD_NUMBER: ${{ github.run_number }}

      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}

      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

    steps:

      - name: Determine iOS release eligibility

        id: ios_eligibility

        run: |

          if [ -n "$APPLE_TEAM_ID" ] && [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER_ID" ] && [ -n "$ASC_PRIVATE_KEY" ]; then

            echo "enabled=true" >> "$GITHUB_OUTPUT"

          else

            echo "enabled=false" >> "$GITHUB_OUTPUT"

            echo "[mobile] Apple signing secrets are incomplete; skipping iOS release job."

          fi

      - name: Checkout

        if: steps.ios_eligibility.outputs.enabled == 'true'

        uses: actions/checkout@v4

        with:

          fetch-depth: 0



      - name: Refresh repository state

        if: steps.ios_eligibility.outputs.enabled == 'true'

        run: |

          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          git fetch origin --prune

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then

            git checkout -B "$BRANCH" "origin/$BRANCH"

            git pull --ff-only origin "$BRANCH"

          else

            echo "[mobile] No matching origin branch for ${BRANCH}; continuing with checked-out ref."

          fi



      - name: Setup pnpm

        if: steps.ios_eligibility.outputs.enabled == 'true'

        uses: pnpm/action-setup@v4

        with:

          version: 11.7.0

          run_install: false



      - name: Setup Node

        if: steps.ios_eligibility.outputs.enabled == 'true'

        uses: actions/setup-node@v4

        with:

          node-version: 22

          cache: pnpm



      - name: Install dependencies

        if: steps.ios_eligibility.outputs.enabled == 'true'

        run: |

          pnpm install --frozen-lockfile

          pnpm rebuild @swc/core lightningcss



      - name: Build web app

        if: steps.ios_eligibility.outputs.enabled == 'true'

        run: |

          echo "[mobile] Skipping iOS web build in this job; Android job already validates web build."
      - name: Ensure iOS project exists

        if: steps.ios_eligibility.outputs.enabled == 'true'

        run: |

          if [ ! -f apps/mobile-capacitor/ios/App/App.xcodeproj/project.pbxproj ]; then

            rm -rf apps/mobile-capacitor/ios

            npm --prefix apps/mobile-capacitor install --no-save @capacitor/ios@^7.0.0

            pnpm --dir apps/mobile-capacitor exec cap add ios

          fi

          mkdir -p apps/mobile-capacitor/ios/App/App/public



      - name: Sync Capacitor

        if: steps.ios_eligibility.outputs.enabled == 'true'

        run: |

          node scripts/prepare-mobile-certificates.mjs

          node scripts/sync-repo-state.mjs

          node scripts/validate-mobile-env.mjs

          pnpm --dir apps/mobile-capacitor exec cap sync ios



      - name: Verify Apple signing secrets

        if: steps.ios_eligibility.outputs.enabled == 'true'

        run: |

          missing=0

          for key in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do

            if [ -z "${!key}" ]; then

              echo "::error::Missing required secret: $key"

              missing=1

            fi

          done

          if [ "$missing" -ne 0 ]; then

            exit 1

          fi



      - name: Build iOS production artifact

        if: steps.ios_eligibility.outputs.enabled == 'true'

        run: pnpm run mobile:capacitor:build:ios



      - name: iOS release readiness marker

        if: steps.ios_eligibility.outputs.enabled == 'true'

        run: |

          echo "iOS artifact is ready for signing/TestFlight upload."



      - name: Upload iOS release artifacts

        if: ${{ always() && steps.ios_eligibility.outputs.enabled == 'true' }}

        uses: actions/upload-artifact@v4

        with:

          name: capacitor-ios-release-${{ github.run_number }}

          path: |

            apps/mobile-capacitor/ios/App/build/**

            apps/mobile-capacitor/build-metadata/**

          if-no-files-found: ignore

