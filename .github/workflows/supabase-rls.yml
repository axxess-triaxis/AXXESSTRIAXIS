name: Supabase RLS Persona Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rls-artifact-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm RLS persona artifacts
        run: |
          test -f supabase/tests/rls_persona_tests.sql
          test -f supabase/tests/persona_fixtures.sql
          test -f docs/RLS_PERSONA_TESTS.md
      - name: Provider-gated note
        run: echo "Run SQL tests against local/staging Supabase after secrets and CLI are configured."
