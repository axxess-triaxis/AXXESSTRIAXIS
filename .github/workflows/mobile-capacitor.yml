name: Mobile Capacitor Build

on:
  workflow_dispatch:
  push:
    branches:
      - sprint-18-pilot-conversion-audit-exports-webhooks
    paths:
      - ".github/workflows/mobile-capacitor.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "src/**"
      - "public/**"
      - "next.config.mjs"

permissions:
  contents: read

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  CAPACITOR_APP_ID: com.triaxis.axxess
  CAPACITOR_APP_NAME: AXXESS TRIAXIS
  CAPACITOR_SERVER_URL: ${{ secrets.CAPACITOR_SERVER_URL || secrets.NEXT_PUBLIC_APP_URL || vars.CAPACITOR_SERVER_URL || vars.NEXT_PUBLIC_APP_URL || 'https://axxess-triaxis.vercel.app' }}
  CAPACITOR_ALLOWED_HOSTS: ${{ secrets.CAPACITOR_ALLOWED_HOSTS || vars.CAPACITOR_ALLOWED_HOSTS || 'axxess-triaxis.vercel.app,localhost,127.0.0.1' }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || vars.NEXT_PUBLIC_APP_URL || 'https://axxess-triaxis.vercel.app' }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'preview-anon-key' }}
  NEXT_PUBLIC_AXXESS_DEMO_MODE: "true"

jobs:
  android:
    name: Android Capacitor debug artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Report preview runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          echo "Capacitor preview server URL: ${CAPACITOR_SERVER_URL}"
          echo "Capacitor allowed hosts: ${CAPACITOR_ALLOWED_HOSTS}"
          if [[ "${NEXT_PUBLIC_SUPABASE_URL}" == "https://example.supabase.co" ]]; then
            echo "::warning::NEXT_PUBLIC_SUPABASE_URL is not configured; using a build-only preview placeholder. Configure repository secrets before signed release builds."
          fi
          if [[ "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" == "preview-anon-key" ]]; then
            echo "::warning::NEXT_PUBLIC_SUPABASE_ANON_KEY is not configured; using a build-only preview placeholder. Configure repository secrets before signed release builds."
          fi

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Create Capacitor shell
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p capacitor-shell/www
          printf '<!doctype html><html><head><meta charset="utf-8"><title>AXXESS TRIAXIS</title></head><body><p>AXXESS mobile shell</p></body></html>' > capacitor-shell/www/index.html
          cat > capacitor-shell/package.json <<'JSON'
          {
            "private": true,
            "scripts": {
              "cap": "cap"
            },
            "dependencies": {
              "@capacitor/android": "^7.0.0",
              "@capacitor/cli": "^7.0.0",
              "@capacitor/core": "^7.0.0"
            }
          }
          JSON
          node - <<'NODE'
          const fs = require("fs");
          const allowedHosts = (process.env.CAPACITOR_ALLOWED_HOSTS || "")
            .split(",")
            .map((item) => item.trim())
            .filter(Boolean);
          const config = {
            appId: process.env.CAPACITOR_APP_ID,
            appName: process.env.CAPACITOR_APP_NAME,
            webDir: "www",
            server: {
              url: process.env.CAPACITOR_SERVER_URL,
              cleartext: false,
              allowNavigation: allowedHosts,
            },
          };
          fs.writeFileSync("capacitor-shell/capacitor.config.json", JSON.stringify(config, null, 2));
          NODE

      - name: Install Capacitor Android
        working-directory: capacitor-shell
        run: npm install

      - name: Generate Android project
        working-directory: capacitor-shell
        run: npx cap add android

      - name: Sync Android project
        working-directory: capacitor-shell
        run: npx cap sync android

      - name: Build Android debug APK
        working-directory: capacitor-shell/android
        run: ./gradlew assembleDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: axxess-capacitor-android-debug
          path: capacitor-shell/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  ios:
    name: iOS Capacitor simulator artifact
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Report preview runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          echo "Capacitor preview server URL: ${CAPACITOR_SERVER_URL}"
          echo "Capacitor allowed hosts: ${CAPACITOR_ALLOWED_HOSTS}"
          if [[ "${NEXT_PUBLIC_SUPABASE_URL}" == "https://example.supabase.co" ]]; then
            echo "::warning::NEXT_PUBLIC_SUPABASE_URL is not configured; using a build-only preview placeholder. Configure repository secrets before signed release builds."
          fi
          if [[ "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" == "preview-anon-key" ]]; then
            echo "::warning::NEXT_PUBLIC_SUPABASE_ANON_KEY is not configured; using a build-only preview placeholder. Configure repository secrets before signed release builds."
          fi

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Create Capacitor shell
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p capacitor-shell/www
          printf '<!doctype html><html><head><meta charset="utf-8"><title>AXXESS TRIAXIS</title></head><body><p>AXXESS mobile shell</p></body></html>' > capacitor-shell/www/index.html
          cat > capacitor-shell/package.json <<'JSON'
          {
            "private": true,
            "scripts": {
              "cap": "cap"
            },
            "dependencies": {
              "@capacitor/cli": "^7.0.0",
              "@capacitor/core": "^7.0.0",
              "@capacitor/ios": "^7.0.0"
            }
          }
          JSON
          node - <<'NODE'
          const fs = require("fs");
          const allowedHosts = (process.env.CAPACITOR_ALLOWED_HOSTS || "")
            .split(",")
            .map((item) => item.trim())
            .filter(Boolean);
          const config = {
            appId: process.env.CAPACITOR_APP_ID,
            appName: process.env.CAPACITOR_APP_NAME,
            webDir: "www",
            server: {
              url: process.env.CAPACITOR_SERVER_URL,
              cleartext: false,
              allowNavigation: allowedHosts,
            },
          };
          fs.writeFileSync("capacitor-shell/capacitor.config.json", JSON.stringify(config, null, 2));
          NODE

      - name: Install Capacitor iOS
        working-directory: capacitor-shell
        run: npm install

      - name: Generate iOS project
        working-directory: capacitor-shell
        run: npx cap add ios

      - name: Sync iOS project
        working-directory: capacitor-shell
        run: npx cap sync ios

      - name: Build iOS simulator app
        working-directory: capacitor-shell/ios/App
        run: xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator -derivedDataPath build CODE_SIGNING_ALLOWED=NO build

      - name: Package iOS simulator artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent capacitor-shell/ios/App/build/Build/Products/Debug-iphonesimulator/App.app artifacts/axxess-capacitor-ios-simulator.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: axxess-capacitor-ios-simulator
          path: artifacts/axxess-capacitor-ios-simulator.zip
          if-no-files-found: error
          retention-days: 14
