packages:
  - '.'
  - 'apps/*'
  - 'packages/*'
supportedArchitectures:
  os:
    - win32
    - linux
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published < 7 days ago, matching the root pnpm-workspace.yaml.
minimumReleaseAge: 10080
allowBuilds:
  '@swc/core': true
  '@tailwindcss/oxide': true
  esbuild: true
  sharp: true
  unrs-resolver: true
overrides:
  baseline-browser-mapping: 2.10.42
  caniuse-lite: 1.0.30001802
  electron-to-chromium: 1.5.387
  lru-cache: 11.5.1
  nanoid: 3.3.15
  node-releases: 2.0.50
  postcss: 8.5.15
