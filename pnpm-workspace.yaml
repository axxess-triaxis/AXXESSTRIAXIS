packages:
  - '.'
  - 'apps/*'
  - 'packages/*'
supportedArchitectures:
  os:
    - win32
    - linux
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published < 7 days ago, matching the root pnpm-workspace.yaml.
minimumReleaseAge: 10080
allowBuilds:
  '@swc/core': true
  '@tailwindcss/oxide': true
  esbuild: true
  sharp: true
  unrs-resolver: true
overrides:
  postcss: 8.5.16
  uuid: 11.1.1
  # Dependabot #38 (high): DoS via exponential-time expansion of consecutive
  # non-expanding {} groups, fixed upstream in 2.1.2. Transitive via minimatch (eslint chain).
  brace-expansion@>=2.0.0 <2.1.2: '>=2.1.2'
  # Dependabot #42 (medium): process crash via PAX numeric path type confusion, fixed
  # upstream in 7.5.18. Transitive via @capacitor/cli and expo (mobile build tooling).
  tar@<=7.5.17: '>=7.5.18'
