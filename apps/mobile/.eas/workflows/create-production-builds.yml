# Manual production release workflow. Preview builds are handled by create-preview-builds.yml on mobile-relevant pushes to main.
name: Create Production Builds (Manual Release)

on:
  workflow_dispatch: {}

jobs:
  build_android:
    type: build
    environment: production
    params:
      platform: android
      profile: production

  build_ios:
    type: build
    environment: production
    params:
      platform: ios
      profile: production
